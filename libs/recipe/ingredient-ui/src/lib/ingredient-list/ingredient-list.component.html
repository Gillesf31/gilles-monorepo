<ul
  cdkDropList
  [cdkDropListData]="ingredients()"
  [cdkDropListDisabled]="!reorderable()"
  (cdkDropListDropped)="drop($event)"
  class="ingredient-drop-list space-y-2"
>
  @for (ingredient of ingredients(); track $index; let i = $index) {
    <li
      cdkDrag
      [cdkDragDisabled]="!reorderable()"
      [cdkDragPreviewContainer]="'parent'"
      class="ingredient-row flex items-start gap-3 rounded-2xl transition-colors"
      [class.bg-white]="reorderable()"
      [class.dark:bg-zinc-900]="reorderable()"
      [class.border]="reorderable()"
      [class.border-zinc-200]="reorderable()"
      [class.dark:border-zinc-800]="reorderable()"
      [class.p-4]="reorderable()"
      [class.shadow-sm]="reorderable()"
    >
      @if (reorderable()) {
        <button
          cdkDragHandle
          type="button"
          class="mt-0.5 grid h-8 w-8 shrink-0 cursor-grab place-items-center rounded-full text-zinc-400 transition-colors hover:bg-zinc-100 hover:text-zinc-700 active:cursor-grabbing dark:text-zinc-500 dark:hover:bg-zinc-800 dark:hover:text-zinc-200"
          [attr.aria-label]="'Déplacer ' + formatIngredient(ingredient)"
        >
          <span class="text-lg leading-none">≡</span>
        </button>
      }
      <input
        type="checkbox"
        [id]="'ingredient-' + i"
        [checked]="isChecked(i)"
        (change)="toggle(i)"
        class="mt-1 h-5 w-5 shrink-0 cursor-pointer rounded accent-emerald-600"
      />
      <label
        [for]="'ingredient-' + i"
        class="cursor-pointer text-lg leading-7 transition-all duration-200"
        [class.line-through]="isChecked(i)"
        [class.text-zinc-400]="isChecked(i)"
        [class.dark:text-zinc-600]="isChecked(i)"
        [class.text-zinc-700]="!isChecked(i)"
        [class.dark:text-zinc-300]="!isChecked(i)"
        >{{ formatIngredient(ingredient) }}</label
      >
    </li>
  }
</ul>
