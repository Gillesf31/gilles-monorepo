<div class="space-y-3">
  @for (
    ingredient of ingredients();
    track trackByIndex($index);
    let i = $index
  ) {
    <div
      class="grid gap-2 rounded-2xl border border-zinc-200 bg-white p-3 shadow-sm shadow-zinc-950/5 dark:border-zinc-800 dark:bg-zinc-900 sm:grid-cols-[minmax(5.5rem,0.7fr)_minmax(8rem,0.9fr)_minmax(12rem,2fr)_auto] sm:items-end"
    >
      <label class="block">
        <span
          class="mb-1 block text-xs font-semibold uppercase tracking-[0.18em] text-zinc-500 dark:text-zinc-500"
        >
          Quantité
        </span>
        <input
          type="text"
          inputmode="text"
          autocomplete="off"
          [value]="ingredient.quantity"
          (input)="updateIngredient(i, 'quantity', $event)"
          class="h-11 w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 text-sm font-medium text-zinc-950 outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100 dark:border-zinc-800 dark:bg-zinc-950 dark:text-zinc-100 dark:focus:border-emerald-500 dark:focus:bg-zinc-950 dark:focus:ring-emerald-950"
          placeholder="200"
        />
      </label>

      <label class="block">
        <span
          class="mb-1 block text-xs font-semibold uppercase tracking-[0.18em] text-zinc-500 dark:text-zinc-500"
        >
          Unité
        </span>
        <select
          [value]="ingredient.unit"
          (change)="updateIngredient(i, 'unit', $event)"
          class="h-11 w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 text-sm font-medium text-zinc-950 outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100 dark:border-zinc-800 dark:bg-zinc-950 dark:text-zinc-100 dark:focus:border-emerald-500 dark:focus:bg-zinc-950 dark:focus:ring-emerald-950"
        >
          @for (unit of units(); track unit) {
            <option [value]="unit">{{ unit || 'Sans unité' }}</option>
          }
        </select>
      </label>

      <label class="block">
        <span
          class="mb-1 block text-xs font-semibold uppercase tracking-[0.18em] text-zinc-500 dark:text-zinc-500"
        >
          Ingrédient
        </span>
        <input
          type="text"
          autocomplete="off"
          [value]="ingredient.name"
          (input)="updateIngredient(i, 'name', $event)"
          class="h-11 w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 text-sm font-semibold text-zinc-950 outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100 dark:border-zinc-800 dark:bg-zinc-950 dark:text-zinc-100 dark:focus:border-emerald-500 dark:focus:bg-zinc-950 dark:focus:ring-emerald-950"
          placeholder="Spaghetti"
        />
      </label>

      <button
        gillesMonorepoBtn
        variant="remove"
        type="button"
        [disabled]="ingredients().length <= 1"
        (click)="removeIngredient(i)"
        [attr.aria-label]="removeLabel() + ' ' + (i + 1)"
        class="h-11 w-11 justify-self-start sm:justify-self-end"
      >
        ✕
      </button>
    </div>
  }

  <button
    gillesMonorepoBtn
    variant="ghost"
    size="sm"
    type="button"
    (click)="addIngredient()"
  >
    + {{ addLabel() }}
  </button>
</div>
