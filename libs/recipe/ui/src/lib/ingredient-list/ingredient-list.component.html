<ul
  cdkDropList
  [cdkDropListData]="ingredients()"
  [cdkDropListDisabled]="!reorderable()"
  (cdkDropListDropped)="drop($event)"
  class="ingredient-drop-list space-y-2"
>
  @for (ingredient of ingredients(); track $index; let i = $index) {
    <li
      cdkDrag
      [cdkDragDisabled]="!reorderable()"
      [cdkDragPreviewContainer]="'parent'"
      class="ingredient-row flex items-start gap-3 rounded-lg transition-colors"
      [class.bg-white]="reorderable()"
      [class.dark:bg-gray-900]="reorderable()"
      [class.border]="reorderable()"
      [class.border-gray-200]="reorderable()"
      [class.dark:border-gray-800]="reorderable()"
      [class.p-3]="reorderable()"
      [class.shadow-sm]="reorderable()"
    >
      @if (reorderable()) {
        <button
          cdkDragHandle
          type="button"
          class="mt-0.5 grid h-8 w-8 shrink-0 cursor-grab place-items-center rounded-md text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-700 active:cursor-grabbing dark:text-gray-500 dark:hover:bg-gray-800 dark:hover:text-gray-200"
          [attr.aria-label]="'Déplacer ' + ingredient"
        >
          <span class="text-lg leading-none">≡</span>
        </button>
      }
      <input
        type="checkbox"
        [id]="'ingredient-' + i"
        [checked]="isChecked(i)"
        (change)="toggle(i)"
        class="mt-1 shrink-0 w-5 h-5 rounded accent-amber-500 cursor-pointer"
      />
      <label
        [for]="'ingredient-' + i"
        class="cursor-pointer text-lg leading-7 transition-all duration-200"
        [class.line-through]="isChecked(i)"
        [class.text-gray-400]="isChecked(i)"
        [class.dark:text-gray-600]="isChecked(i)"
        [class.text-gray-700]="!isChecked(i)"
        [class.dark:text-gray-300]="!isChecked(i)"
      >{{ ingredient }}</label>
    </li>
  }
</ul>
